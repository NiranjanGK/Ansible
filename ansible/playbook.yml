- name: Deploy to Tomcat
  hosts: web
  become: yes
  tasks:
    - name: copy WAR file to Tomcat
      copy:
        src: "/var/snap/jenkins/5042/current/workspace/Ansible/target/Ansible.war"
        dest: "/opt/tomcat/webapps/Ansible.war"
        remote_src: no
    - name: Restart Tomcat
      systemmd: 
        name: tomcat
        state: restarted
